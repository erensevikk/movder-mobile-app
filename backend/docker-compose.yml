services:
  # 1. Kalıcı Veritabanı (Kullanıcı Profilleri, Film Geçmişi, Mesaj Logları)
  mongodb:
    image: mongo:7.0
    container_name: movder_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password123}
    volumes:
      - mongo_data:/data/db
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 2. Hızlı Bellek (Canlı İzleme Sayaçları, O Anki "Online" Durumları)
  redis:
    image: redis:7.2-alpine
    container_name: movder_redis
    restart: always
    # Port sadece development için dışarı açık, production'da kaldırılabilir
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass123}
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # 3. Mesaj ve Görev Kuyruğu (Eşleşme Radarı ve Chat Trafik Polisi)
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: movder_rabbitmq
    restart: always
    # Port sadece development için dışarı açık, production'da kaldırılabilir
    # Management UI için 15672, AMQP için 5672
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitpass123}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

# Verilerin bilgisayarı kapatsak bile silinmemesi için kalıcı disk alanları
volumes:
  mongo_data:
  redis_data:
  rabbitmq_data:
